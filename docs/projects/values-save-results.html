    ];

    /* Decorations UI disabled — see also drawDecorations call in buildSourceCanvas.
    const decorationOptions = [

    */

    try {
      localStorage.removeItem("valuesListStyleConfig");

    }

    const styleState = {
      backgroundColor: "#ffffff",
      textColor: "#000000",
      decorationId: "none",
    };

    const selectedValuesRaw = JSON.parse(localStorage.getItem("selectedValuesForRanking") || "[]");
    const selectedValues = selectedValuesRaw.map((item) =>
      typeof item === "string"
        ? { name: item, description: "" }
        : { name: item.name, description: item.description || "" },
    );

    const hasPdfLib = typeof window.PDFLib !== "undefined";

    let cachedPdfBytes = null;
    let cachedSourceCanvas = null;
    let pdfFooterLinkRectCanvas = null;

    const starImagePromises = new Map();

    async function loadStarImage(fillHex) {
      const key = fillHex.toLowerCase();
      if (starImagePromises.has(key)) {
        return starImagePromises.get(key);
      }
      const promise = (async () => {
        const res = await fetch(new URL("../assets/star.svg", window.location.href));
        let svgText = await res.text();
        svgText = svgText.replace(/currentColor/gi, fillHex);
        const blob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          img.src = url;
        });
        URL.revokeObjectURL(url);
        return img;
      })();
      starImagePromises.set(key, promise);
      return promise;
    }

    function hexToRgbUnit(hex) {
      const h = (hex || "#ffffff").replace("#", "");
      return {
        r: parseInt(h.slice(0, 2), 16) / 255,
        g: parseInt(h.slice(2, 4), 16) / 255,
        b: parseInt(h.slice(4, 6), 16) / 255,
      };
    }

    function relativeLuminance({ r, g, b }) {
      const lin = (v) => (v <= 0.03928 ? v / 12.92 : ((v + 0.055) / 1.055) ** 2.4);
      return 0.2126 * lin(r) + 0.7152 * lin(g) + 0.0722 * lin(b);
    }

    function mixHex(a, b, t) {
      const A = hexToRgbUnit(a);
      const B = hexToRgbUnit(b);
      const r = Math.round((A.r + (B.r - A.r) * t) * 255);
      const g = Math.round((A.g + (B.g - A.g) * t) * 255);
      const bl = Math.round((A.b + (B.b - A.b) * t) * 255);
      const toHex = (n) =>
        Math.max(0, Math.min(255, n))
          .toString(16)
          .padStart(2, "0");
      return `#${toHex(r)}${toHex(g)}${toHex(bl)}`;
    }

    function decorationTone(bgHex) {
      const lum = relativeLuminance(hexToRgbUnit(bgHex));
      if (lum > 0.55) {
        return mixHex(bgHex, "#000000", 0.42);
      }
      return mixHex(bgHex, "#ffffff", 0.45);
    }

    function mulberry32(seed) {
      return () => {
        let t = (seed += 0x6d2b79f5);
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function pointInTextColumn(x, y, width, height, m) {
      return x >= m && x <= width - m && y >= m && y <= height - m;
    }

    function starAabbClearOfPageAndText(cx, cy, halfDiag, width, height, m, pagePad) {
      const L = cx - halfDiag;
      const R = cx + halfDiag;
      const T = cy - halfDiag;
      const B = cy + halfDiag;
      if (L < pagePad || R > width - pagePad || T < pagePad || B > height - pagePad) {
        return false;
      }
      const tx0 = m;
      const tx1 = width - m;
      const ty0 = m;
      const ty1 = height - m;
      return !(L < tx1 && R > tx0 && T < ty1 && B > ty0);
    }

    function shuffleArray(arr, rand) {
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(rand() * (i + 1));
        const t = arr[i];
        arr[i] = arr[j];
        arr[j] = t;
      }
    }

    function collectStratifiedMarginCenters(width, height, m, maxHalfDiag, pagePad, gridPadding) {
      const centers = [];
      const step = maxHalfDiag * 2 + gridPadding;
      if (step <= 0) {
        return centers;
      }

      const xLeftLo = pagePad + maxHalfDiag;
      const xLeftHi = m - pagePad - maxHalfDiag;
      if (xLeftHi >= xLeftLo) {
        for (let cy = pagePad + maxHalfDiag; cy <= height - pagePad - maxHalfDiag; cy += step) {
          for (let cx = xLeftLo; cx <= xLeftHi; cx += step) {
            centers.push({ x: cx, y: cy });
          }
        }
      }

      const xRightLo = width - m + pagePad + maxHalfDiag;
      const xRightHi = width - pagePad - maxHalfDiag;
      if (xRightHi >= xRightLo) {
        for (let cy = pagePad + maxHalfDiag; cy <= height - pagePad - maxHalfDiag; cy += step) {
          for (let cx = xRightLo; cx <= xRightHi; cx += step) {
            centers.push({ x: cx, y: cy });
          }
        }
      }

      const xTopLo = m + pagePad + maxHalfDiag;
      const xTopHi = width - m - pagePad - maxHalfDiag;
      const yTopLo = pagePad + maxHalfDiag;
      const yTopHi = m - pagePad - maxHalfDiag;
      if (xTopHi >= xTopLo && yTopHi >= yTopLo) {
        for (let cy = yTopLo; cy <= yTopHi; cy += step) {
          for (let cx = xTopLo; cx <= xTopHi; cx += step) {
            centers.push({ x: cx, y: cy });
          }
        }
      }

      const yBotLo = height - m + pagePad + maxHalfDiag;
      const yBotHi = height - pagePad - maxHalfDiag;
      if (xTopHi >= xTopLo && yBotHi >= yBotLo) {
        for (let cy = yBotLo; cy <= yBotHi; cy += step) {
          for (let cx = xTopLo; cx <= xTopHi; cx += step) {
            centers.push({ x: cx, y: cy });
          }
        }
      }

      return centers;
    }

    function invalidateRenderCaches() {
      cachedPdfBytes = null;
      cachedSourceCanvas = null;
      pdfFooterLinkRectCanvas = null;
    }

    function refreshPreview() {
      invalidateRenderCaches();
      return renderPngPreview();
    }

    async function drawStarSprites(ctx, width, height, bgHex, m) {
      const tone = decorationTone(bgHex);
      const img = await loadStarImage(tone);
      const rand = mulberry32(0xdec0de + width + height);

      const minSize = 48;
      const maxSize = 128;
      const minHalfDiag = (minSize / 2) * Math.SQRT2;
      const pagePad = 10;
      const gridPadding = 16;
      const starSep = 10;
      const jitterCell = 12;
      const targetCount = 42;

      const baseCenters = collectStratifiedMarginCenters(width, height, m, minHalfDiag, pagePad, gridPadding);
      shuffleArray(baseCenters, rand);

      const placed = [];

      for (let i = 0; i < baseCenters.length && placed.length < targetCount; i += 1) {
        const size = minSize + rand() * (maxSize - minSize);
        const halfDiag = (size / 2) * Math.SQRT2;
        let cx = baseCenters[i].x + (rand() - 0.5) * jitterCell;
        let cy = baseCenters[i].y + (rand() - 0.5) * jitterCell;

        cx = Math.max(pagePad + halfDiag, Math.min(width - pagePad - halfDiag, cx));
        cy = Math.max(pagePad + halfDiag, Math.min(height - pagePad - halfDiag, cy));

        if (!starAabbClearOfPageAndText(cx, cy, halfDiag, width, height, m, pagePad)) {
          continue;
        }

        let overlaps = false;
        for (let p = 0; p < placed.length; p += 1) {
          const q = placed[p];
          const dx = cx - q.cx;
          const dy = cy - q.cy;
          const minDist = halfDiag + q.halfDiag + starSep;
          if (dx * dx + dy * dy < minDist * minDist) {
            overlaps = true;
            break;
          }
        }
        if (overlaps) {
          continue;
        }

        placed.push({ cx, cy, size, halfDiag });
      }

      ctx.save();
      ctx.globalAlpha = 0.22;
      for (let i = 0; i < placed.length; i += 1) {
        const { cx, cy, size } = placed[i];
        const angle = rand() * Math.PI * 2;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.drawImage(img, -size / 2, -size / 2, size, size);
        ctx.restore();
      }
      ctx.restore();
    }

    async function drawDecorations(ctx, width, height, decorationId, bgHex, m) {
      if (!decorationId || decorationId === "none") return;
      switch (decorationId) {
        case "dots": {
          ctx.save();
          ctx.strokeStyle = "#64748b";
          ctx.fillStyle = "#64748b";
          ctx.globalAlpha = 0.11;
          const step = 130;
          for (let x = 0; x < width; x += step) {
            for (let y = 0; y < height; y += step) {
              if (pointInTextColumn(x, y, width, height, m)) {
                continue;
              }
              ctx.beginPath();
              ctx.arc(x, y, 5, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          ctx.restore();
          break;
        }
        case "stars": {
          await drawStarSprites(ctx, width, height, bgHex, m);
          break;
        }
        case "lines": {
          ctx.save();
          ctx.strokeStyle = "#64748b";
          ctx.globalAlpha = 0.08;
          ctx.lineWidth = 2;
          const pad = 28;
          const rand = mulberry32(0x1e4e5 + width + height);
          const xSpan = Math.max(40, width - 2 * m);
          for (let k = 0; k < 20; k += 1) {
            const zone = Math.floor(rand() * 4);
            ctx.beginPath();
            if (zone === 0) {
              const x = pad + rand() * Math.max(12, m - pad * 2);
              const y0 = pad + rand() * Math.max(20, height - pad * 2);
              const x2 = Math.min(m - pad, x + 18 + rand() * (m * 0.45));
              ctx.moveTo(x, y0);
              ctx.lineTo(x2, y0 + (rand() - 0.5) * 80);
            } else if (zone === 1) {
              const x = width - m + pad + rand() * Math.max(12, m - pad * 2);
              const y0 = pad + rand() * Math.max(20, height - pad * 2);
              const x2 = Math.max(width - m + pad, x - 18 - rand() * (m * 0.45));
              ctx.moveTo(x, y0);
              ctx.lineTo(x2, y0 + (rand() - 0.5) * 80);
            } else if (zone === 2) {
              const y = pad + rand() * Math.max(12, m - pad * 2);
              const x0 = pad + rand() * Math.max(20, width - pad * 2);
              ctx.moveTo(x0, y);
              ctx.lineTo(x0 + (rand() - 0.5) * xSpan * 0.25, y);
            } else {
              const y = height - m + pad + rand() * Math.max(12, m - pad * 2);
              const x0 = m + rand() * xSpan;
              ctx.moveTo(x0, y);
              ctx.lineTo(x0 + (rand() - 0.5) * xSpan * 0.28, y);
            }
            ctx.stroke();
          }
          ctx.restore();
          break;
        }
        case "waves": {
          ctx.save();
          ctx.strokeStyle = "#64748b";
          ctx.globalAlpha = 0.1;
          ctx.lineWidth = 2;
          const rand = mulberry32(0xc0ffee + width);
          for (let strip = 0; strip < 3; strip += 1) {
            let y = height - m + 26 + strip * 28 + rand() * 14;
            y = Math.min(y, height - 14);
            ctx.beginPath();
            ctx.moveTo(m, y);
            for (let x = m; x <= width - m; x += 18) {
              ctx.lineTo(x, y + Math.sin((x - m) / 72) * 12);
            }
            ctx.stroke();
          }
          ctx.restore();
          break;
        }
        default:
          break;
      }
    }

    function buildMarkdownList() {
      const lines = ["## Мои основные ценности", ""];
      selectedValues.forEach((item, index) => {
        lines.push(`${index + 1}. **${item.name}** — ${item.description || ""}`);
      });
      return lines.join("\n");
    }

    function wrapTextWithCanvas(text, context, maxWidth) {
      /* \n = new text row; \n\n = extra blank row. NBSP is kept inside “words” so they don’t break. */
      const NBSP = "\u00A0";
      const NBSP_PH = "\uE000";

      const wrapParagraph = (paragraph) => {
        const guarded = paragraph.replaceAll(NBSP, NBSP_PH);
        const words = guarded.split(/\s+/).filter(Boolean).map((w) => w.replaceAll(NBSP_PH, NBSP));
        const lines = [];
        let line = "";
        words.forEach((word) => {
          const candidate = line ? `${line} ${word}` : word;
          if (context.measureText(candidate).width <= maxWidth) {
            line = candidate;
            return;
          }
          if (line) {
            lines.push(line);
          }
          line = word;
        });
        if (line) {
          lines.push(line);
        }
        return lines;
      };

      const segments = (text || "").split(/\r\n|\r|\n/);
      const lines = [];
      segments.forEach((segment) => {
        if (segment.trim() === "") {
          if (lines.length > 0) {
            lines.push("");
          }
          return;
        }
        lines.push(...wrapParagraph(segment));
      });
      return lines;
    }

    function hexToRgbPdf(hexColor) {
      const safeHex = (hexColor || "#ffffff").replace("#", "");
      const r = parseInt(safeHex.slice(0, 2), 16) / 255;
      const g = parseInt(safeHex.slice(2, 4), 16) / 255;
      const b = parseInt(safeHex.slice(4, 6), 16) / 255;
      return PDFLib.rgb(r, g, b);
    }

    function capitalizeFirstLetter(text) {
      const t = (text || "").trim();
      if (!t) {
        return t;
      }
      return `${t.charAt(0).toUpperCase()}${t.slice(1)}`;
    }

    async function buildSourceCanvas() {
      if (cachedSourceCanvas) {
        return cachedSourceCanvas;
      }

      const width = 2480;
      const height = 3508;
      const margin = 220;
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      const bgColor = styleState.backgroundColor || "#ffffff";
      const textPrimary = styleState.textColor || "#000000";
      const textSecondary = mixHex(textPrimary, bgColor, 0.32);
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, width, height);
      // await drawDecorations(ctx, width, height, styleState.decorationId || "none", bgColor, margin);

      ctx.textBaseline = "top";
      ctx.fillStyle = textPrimary;
      ctx.font = "700 96px 'Segoe UI', Arial, sans-serif";
      ctx.save();
      ctx.textAlign = "center";
      ctx.fillText("Мои основные ценности", width / 2, margin);
      ctx.restore();

      const headerDescription = "";
      const bodyDescFont = "400 48px 'Segoe UI', Arial, sans-serif";
      ctx.font = bodyDescFont;
      ctx.fillStyle = textSecondary;
      const headerDescLines = wrapTextWithCanvas(headerDescription, ctx, width - margin * 2);

      const listCount = selectedValues.length;
      const effN = Math.min(Math.max(listCount, 5), 12);
      const spacingSteps = 12 - effN;
      const extraGapBetweenItems = 14 + spacingSteps * 18;
      const gapAfterContentBlock = 22 + extraGapBetweenItems;

      const bodyDescLineHeight = 70;
      let y = margin + 118;
      headerDescLines.forEach((line) => {
        ctx.fillText(line, margin, y);
        y += bodyDescLineHeight;
      });
      y += gapAfterContentBlock;

      const markdownSource = buildMarkdownList();
      const markdownLines = markdownSource.split("\n");
      const listEntries = markdownLines
        .map((line) => line.match(/^(\d+)\.\s\*\*(.+?)\*\*\s[-—]\s?(.*)$/))
        .filter(Boolean)
        .map((match) => ({
          index: Number(match[1]),
          name: match[2],
          description: match[3] || "",
        }));

      ctx.font = "700 60px 'Segoe UI', Arial, sans-serif";
      const maxListIndex = listEntries.reduce((acc, it) => Math.max(acc, it.index), 0);
      const numberColumnW =
        ctx.measureText(`${Math.max(maxListIndex, 1)}.`).width + 28;
      const valueNameX = margin + numberColumnW;
      const descMaxWidth = Math.max(120, width - valueNameX - margin);

      const entryCount = listEntries.length;
      const spacedForTitleGap = Math.min(12, Math.max(5, entryCount));
      const titleToDescriptionAdvance = Math.round(
        102 - ((spacedForTitleGap - 5) / 7) * 12,
      );

      listEntries.forEach((item, itemIndex) => {
        const descText = capitalizeFirstLetter(item.description || "");

        ctx.font = "700 60px 'Segoe UI', Arial, sans-serif";
        ctx.fillStyle = textPrimary;
        ctx.fillText(`${item.index}.`, margin, y);
        ctx.fillText(capitalizeFirstLetter(item.name || ""), valueNameX, y);
        y += titleToDescriptionAdvance;

        ctx.font = bodyDescFont;
        const descLines = wrapTextWithCanvas(descText, ctx, descMaxWidth);
        ctx.fillStyle = textSecondary;

        if (descLines.length > 0) {
          descLines.forEach((line) => {
            ctx.fillText(line, valueNameX, y);
            y += bodyDescLineHeight;
          });
          y += 22;
        } else {
          y += 96;
        }

        if (itemIndex < listEntries.length - 1) {
          y += extraGapBetweenItems;
        }
      });

      ctx.save();
      ctx.font = bodyDescFont;
      ctx.fillStyle = textSecondary;
      ctx.textAlign = "left";
      ctx.textBaseline = "bottom";
      const footerTw = ctx.measureText(TELEGRAM_FOOTER_TEXT).width;
      const footerLeft = width - margin - footerTw;
      const footerBaselineY = height - margin;
      const footerAscent = 52;
      const footerDescent = 12;
      pdfFooterLinkRectCanvas = {
        left: footerLeft,
        top: footerBaselineY - footerAscent,
        right: width - margin,
        bottom: footerBaselineY + footerDescent,
      };
      ctx.fillText(TELEGRAM_FOOTER_TEXT, footerLeft, footerBaselineY);
      ctx.restore();

      cachedSourceCanvas = canvas;
      return canvas;
    }

    async function buildPdfBytesFromMarkdown() {
      if (!hasPdfLib) {
        throw new Error("PDF library failed to load.");
      }

      if (cachedPdfBytes) {
        return cachedPdfBytes;
      }

      if (selectedValues.length === 0) {
        return null;
      }

      const sourceCanvas = await buildSourceCanvas();
      const pngBlob = await new Promise((resolve, reject) => {
        sourceCanvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error("Unable to build PNG image for PDF."));
            return;
          }
          resolve(blob);
        }, "image/png");
      });
      const imageBytes = new Uint8Array(await pngBlob.arrayBuffer());

      const pdfDoc = await PDFLib.PDFDocument.create();
      const pageWidth = 595.28;
      const pageHeight = 841.89;
      const page = pdfDoc.addPage([pageWidth, pageHeight]);

      const bgColor = styleState.backgroundColor || "#ffffff";
      page.drawRectangle({
        x: 0,
        y: 0,
        width: pageWidth,
        height: pageHeight,
        color: hexToRgbPdf(bgColor),
      });

      const pngImage = await pdfDoc.embedPng(imageBytes);
      const imgRatio = pngImage.width / pngImage.height;
      let drawWidth = pageWidth;
      let drawHeight = drawWidth / imgRatio;
      if (drawHeight < pageHeight) {
        drawHeight = pageHeight;
        drawWidth = drawHeight * imgRatio;
      }
      const x = (pageWidth - drawWidth) / 2;
      const py = (pageHeight - drawHeight) / 2;
      page.drawImage(pngImage, { x, y: py, width: drawWidth, height: drawHeight });

      const b = pdfFooterLinkRectCanvas;
      if (
        b &&
        typeof PDFLib.PDFName !== "undefined" &&
        typeof PDFLib.PDFString !== "undefined"
      ) {
        const cw = pngImage.width;
        const ch = pngImage.height;
        const llx = x + (b.left / cw) * drawWidth;
        const urx = x + (b.right / cw) * drawWidth;
        const ury = py + drawHeight - (b.top / ch) * drawHeight;
        const lly = py + drawHeight - (b.bottom / ch) * drawHeight;
        const linkRef = pdfDoc.context.register(
          pdfDoc.context.obj({
            Type: PDFLib.PDFName.of("Annot"),
            Subtype: PDFLib.PDFName.of("Link"),
            Rect: [llx, lly, urx, ury],
            Border: [0, 0, 0],
            A: pdfDoc.context.obj({
              Type: PDFLib.PDFName.of("Action"),
              S: PDFLib.PDFName.of("URI"),
              URI: PDFLib.PDFString.of(TELEGRAM_FOOTER_URL),
            }),
          }),
        );
        const annotsKey = PDFLib.PDFName.of("Annots");
        const existingAnnots = page.node.lookup(annotsKey);
        if (existingAnnots && typeof existingAnnots.push === "function") {
          existingAnnots.push(linkRef);
        } else {
          page.node.set(annotsKey, pdfDoc.context.obj([linkRef]));
        }
      }

      cachedPdfBytes = await pdfDoc.save({ useObjectStreams: false });
      if (!cachedPdfBytes || cachedPdfBytes.length === 0) {
        throw new Error("Generated PDF is empty.");
      }
      const pdfHeader = new TextDecoder().decode(cachedPdfBytes.slice(0, 5));
      if (pdfHeader !== "%PDF-") {
        throw new Error("Generated PDF header is invalid.");
      }
      return cachedPdfBytes;
    }

    async function ensurePngSourceCanvas() {
      if (selectedValues.length === 0) {
        return null;
      }
      return buildSourceCanvas();
    }

    function setPreviewLoading(isLoading) {
      const el = document.getElementById("preview-loading-indicator");
      if (!el) {
        return;
      }
      if (isLoading) {
        el.innerHTML =
          '<span class="preview-loading-spinner" aria-hidden="true"></span>';
        el.removeAttribute("hidden");
        el.setAttribute("aria-label", "Загрузка предпросмотра");
      } else {
        el.innerHTML = "";
        el.setAttribute("hidden", "");
        el.removeAttribute("aria-label");
      }
    }

    async function renderPngPreview() {
      const target = document.getElementById("final-preview-image");
      if (selectedValues.length === 0) {
        setPreviewLoading(false);
        target.innerHTML = "<p class=\"description\">Нет данных для предпросмотра.</p>";
        return;
      }

      try {
        setPreviewLoading(true);
        target.innerHTML = "";
        const canvas = await ensurePngSourceCanvas();
        if (!canvas) {
          setPreviewLoading(false);
          return;
        }
        const image = document.createElement("img");
        image.className = "final-preview-png";
        image.alt = "Предпросмотр списка ценностей";
        image.src = canvas.toDataURL("image/png");
        target.appendChild(image);
        setPreviewLoading(false);
      } catch (error) {
        setPreviewLoading(false);
        target.innerHTML = `<p class="description">Предпросмотр недоступен: ${error.message}</p>`;
      }
    }

    async function saveAsPng() {
      try {
        invalidateRenderCaches();
        const canvas = await ensurePngSourceCanvas();
        if (!canvas) {
          return;
        }
        const link = document.createElement("a");
        link.download = "values-results.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      } catch (error) {
        alert(`Невозможно сохранить PNG: ${error.message}`);
      }
    }

    async function saveAsPdf() {
      try {
        invalidateRenderCaches();
        const pdfBytes = await buildPdfBytesFromMarkdown();
        if (!pdfBytes) {
          return;
        }
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "values-results.pdf";
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch (error) {
        alert(`Невозможно сохранить PDF: ${error.message}`);
      }
    }

    async function shareAsPdf() {
      try {
        invalidateRenderCaches();
        const pdfBytes = await buildPdfBytesFromMarkdown();
        if (!pdfBytes) {
          return;
        }
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const file = new File([blob], "values-results.pdf", { type: "application/pdf" });
        const shareText = "";

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            text: shareText,
            files: [file],
          });
          return;
        }

        alert(
          "Поделиться файлом с этой страницы на этом устройстве нельзя. Сохраните PDF кнопкой «Сохранить PDF» или PNG кнопкой «Сохранить PNG».",
        );
      } catch (error) {
        alert(`Невозможно поделиться PDF: ${error.message}`);
      }
    }

    function normalizeHex(hex, fallback = "#ffffff") {
      let h = (hex || fallback).trim().replace(/^#/, "").toLowerCase();
      if (h.length === 3) {
        h = h.split("").map((c) => c + c).join("");
      }
      if (!/^[0-9a-f]{6}$/.test(h)) {
        return fallback;
      }
      return `#${h}`;
    }

    function themeMatchesPreset(preset) {
      const b = normalizeHex(styleState.backgroundColor, "#ffffff");
      const t = normalizeHex(styleState.textColor, "#000000");
      const pb = normalizeHex(preset.background, "#ffffff");
      const pt = normalizeHex(preset.text, "#000000");
      return (b === pb && t === pt) || (b === pt && t === pb);
    }

    function initThemePresets() {
      const wrap = document.getElementById("color-options");
      const swapBtn = document.getElementById("theme-swap-btn");
      wrap.querySelectorAll(".color-preset-btn").forEach((el) => el.remove());

      THEME_PRESETS.forEach((preset) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "color-preset-btn color-theme-btn";
        const bg = normalizeHex(preset.background, "#ffffff");
        const tx = normalizeHex(preset.text, "#000000");
        btn.style.backgroundImage = `linear-gradient(90deg, ${bg} 50%, ${tx} 50%)`;
        btn.title = preset.label;
        btn.setAttribute("aria-label", preset.label);
        const selected = themeMatchesPreset(preset);
        btn.setAttribute("aria-pressed", selected ? "true" : "false");
        btn.classList.toggle("is-selected", selected);

        btn.addEventListener("click", () => {
          styleState.backgroundColor = bg;
          styleState.textColor = tx;
          initThemePresets();
          refreshPreview();
        });

        wrap.insertBefore(btn, swapBtn);
      });
    }

    document.getElementById("save-png").addEventListener("click", saveAsPng);
    document.getElementById("save-pdf").addEventListener("click", saveAsPdf);
    // document.getElementById("share-pdf").addEventListener("click", shareAsPdf);

    function initPage() {
      styleState.backgroundColor = normalizeHex(styleState.backgroundColor, "#ffffff");
      styleState.textColor = normalizeHex(styleState.textColor, "#000000");
      initThemePresets();
      // renderDecorations();
      renderPngPreview();
    }

    document.getElementById("theme-swap-btn").addEventListener("click", () => {
      const a = styleState.backgroundColor;
      styleState.backgroundColor = styleState.textColor;
      styleState.textColor = a;
      initThemePresets();
      refreshPreview();
    });

    initPage();
  </script>
